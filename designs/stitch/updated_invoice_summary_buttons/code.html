<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Invoice Summary</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#1DB954",
                        "on-primary": "#ffffff",
                        "primary-container": "#158b3f",
                        "on-primary-container": "#d2f4df",
                        "secondary": "#535353",
                        "on-secondary": "#ffffff",
                        "background": "#f8f9fd",
                        "surface": "#ffffff",
                        "on-surface": "#191c1f",
                        "on-surface-variant": "#464554",
                        "outline": "#777585",
                        "outline-variant": "#c7c5d6",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6",
                        "on-error": "#ffffff",
                        "on-error-container": "#93000a",
                        "surface-container-low": "#f2f3f7",
                        "surface-container": "#edeef2",
                        "surface-container-high": "#e7e8ec"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.5rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #f8f9fd;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="flex items-center px-4 h-16 w-full sticky top-0 bg-[#f8f9fd] dark:bg-slate-900 z-40 transition-colors duration-200">
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-[#1DB954] p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors duration-200">
                arrow_back
            </button>
<h1 class="font-manrope headline-sm font-bold text-[#191c1f] dark:text-white">Invoice Summary</h1>
</div>
</header>
<main class="flex-grow px-4 py-6 max-w-md mx-auto w-full">
<!-- Main Summary Card -->
<div class="bg-[#FFFFFF] border border-[#c7c5d6]/20 shadow-[0_2px_8px_rgba(26,26,46,0.06)] rounded-xl p-6 flex flex-col gap-5">
<!-- Items Section -->
<div class="flex flex-col gap-4">
<div class="flex justify-between items-center">
<span class="text-on-surface-variant body-md">Item Subtotal</span>
<span class="text-on-surface font-semibold body-md">₹2,200</span>
</div>
<div class="flex justify-between items-center">
<span class="text-on-surface-variant body-md">Discount (10%)</span>
<span class="text-[#008545] font-medium body-md">–₹220</span>
</div>
<div class="flex justify-between items-center">
<span class="text-on-surface-variant body-md">CGST 9%</span>
<span class="text-on-surface font-medium body-md">₹198</span>
</div>
<div class="flex justify-between items-center">
<span class="text-on-surface-variant body-md">SGST 9%</span>
<span class="text-on-surface font-medium body-md">₹198</span>
</div>
</div>
<!-- Subtle Tonal Divider -->
<div class="h-px bg-[#c7c5d6]/20 w-full"></div>
<!-- Total Calculation Section -->
<div class="flex flex-col gap-4">
<div class="flex justify-between items-baseline">
<span class="text-[#191c1f] font-bold text-lg">Total Amount</span>
<span class="text-[#1DB954] font-extrabold text-2xl">₹2,376</span>
</div>
<div class="flex justify-between items-center group cursor-pointer">
<div class="flex items-center gap-1 text-[#1DB954]">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'wght' 600;">add</span>
<span class="font-bold text-sm underline underline-offset-4">Amount Received</span>
</div>
<span class="text-on-surface font-semibold body-md">₹1,000</span>
</div>
<div class="flex justify-between items-center bg-[#ffdad6]/30 p-3 rounded-lg border border-[#ffdad6]/50">
<span class="text-error font-bold body-md">Balance Due</span>
<span class="text-error font-extrabold text-lg">₹1,376</span>
</div>
</div>
</div>
<!-- Secondary Information / Meta Section (Contextual Fill) -->
<div class="mt-8 grid grid-cols-2 gap-4">
<div class="bg-surface-container-low p-4 rounded-xl">
<p class="text-on-surface-variant text-[10px] font-bold uppercase tracking-wider mb-1">Invoice ID</p>
<p class="text-on-surface font-bold">#INV-2024-001</p>
</div>
<div class="bg-surface-container-low p-4 rounded-xl">
<p class="text-on-surface-variant text-[10px] font-bold uppercase tracking-wider mb-1">Due Date</p>
<p class="text-on-surface font-bold">14 Oct 2023</p>
</div>
</div>
<!-- Visual Anchor (Purely Aesthetic) -->
</main>
<!-- BottomNavBar / Action Shell -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-6 py-4 pb-8 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl z-50 shadow-[0_-4px_12px_rgba(26,26,46,0.06)] border-t border-[#c7c5d6]/20"><!-- Actions Container -->
<div class="flex items-center justify-between gap-4 w-full max-w-md mx-auto">
<!-- Secondary Action: Go Back -->
<button class="flex items-center justify-center gap-1 text-secondary py-3 px-2 hover:bg-surface-container-low rounded-lg transition-colors">
<span class="material-symbols-outlined text-xl">arrow_back</span>
<span class="font-manrope font-semibold">Go Back</span>
</button>
<!-- Primary Action: Create New Invoice -->
<button class="flex-grow flex items-center justify-center gap-2 bg-primary text-on-primary rounded-lg py-4 shadow-[0_4px_12px_rgba(29,185,84,0.3)] transition-transform active:scale-95">
<span class="material-symbols-outlined text-xl">add_circle</span>
<span class="font-manrope font-bold">Create New Invoice</span>
</button>
</div></nav>
<!-- Spacer for Sticky Footer -->
<div class="h-28"></div>
</body></html>
