<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface-variant": "#3d4a3d",
                        "inverse-on-surface": "#f0f1f2",
                        "tertiary-fixed": "#ffdad9",
                        "surface-container-highest": "#e1e3e4",
                        "inverse-primary": "#53e076",
                        "error": "#ba1a1a",
                        "background": "#f8f9fa",
                        "surface": "#f8f9fa",
                        "secondary-fixed-dim": "#cfc4c4",
                        "on-primary": "#ffffff",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-background": "#191c1d",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed": "#201a1a",
                        "primary-fixed": "#72fe8f",
                        "on-tertiary-fixed-variant": "#881d28",
                        "surface-bright": "#f8f9fa",
                        "secondary-fixed": "#ebe0df",
                        "surface-container": "#edeeef",
                        "on-primary-fixed-variant": "#005320",
                        "surface-tint": "#006e2d",
                        "on-secondary-container": "#696161",
                        "tertiary-fixed-dim": "#ffb3b3",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed-variant": "#4c4545",
                        "on-primary-container": "#004118",
                        "on-error-container": "#93000a",
                        "secondary": "#645d5c",
                        "tertiary": "#a8353e",
                        "primary-fixed-dim": "#53e076",
                        "outline-variant": "#bccbb9",
                        "secondary-container": "#e8dddd",
                        "tertiary-container": "#ff767b",
                        "on-tertiary-fixed": "#400009",
                        "primary-container": "#1db954",
                        "inverse-surface": "#2e3132",
                        "surface-container-low": "#f3f4f5",
                        "on-surface": "#191c1d",
                        "on-tertiary-container": "#730a1b",
                        "surface-dim": "#d9dadb",
                        "primary": "#006e2d",
                        "on-tertiary": "#ffffff",
                        "surface-container-high": "#e7e8e9",
                        "on-primary-fixed": "#002108",
                        "surface-variant": "#e1e3e4",
                        "outline": "#6d7b6c"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Manrope', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-zinc-200">
<!-- Mock Background Screen (Blurred) -->
<div class="fixed inset-0 bg-black/40 backdrop-blur-sm z-0">
<div class="p-6">
<div class="h-64 bg-surface-container-lowest rounded-xl mb-4 opacity-50"></div>
<div class="h-32 bg-surface-container-lowest rounded-xl mb-4 opacity-50"></div>
</div>
</div>
<!-- Bottom Sheet Wrapper -->
<div class="fixed inset-0 z-50 flex items-end justify-center pointer-events-none">
<!-- The Bottom Sheet Container -->
<main class="relative w-full max-w-lg bg-white dark:bg-zinc-950 rounded-t-[24px] pointer-events-auto flex flex-col max-h-[813px] overflow-hidden shadow-[0px_-12px_32px_rgba(25,28,29,0.12)]">
<!-- Handle Bar -->
<div class="flex justify-center pt-3 pb-1">
<div class="w-10 h-1.5 bg-surface-container-highest rounded-full"></div>
</div>
<!-- Header (TopAppBar Context) -->
<header class="flex items-center justify-between px-6 py-4 w-full bg-white dark:bg-zinc-950">
<h1 class="font-manrope headline-sm font-bold tracking-tight text-zinc-900 dark:text-zinc-50">Edit Adjustments</h1>
<button class="w-10 h-10 flex items-center justify-center hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors rounded-full active:opacity-80">
<span class="material-symbols-outlined text-zinc-600 dark:text-zinc-400" data-icon="close">close</span>
</button>
</header>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto px-6 pb-32">
<!-- Invoice Summary Header -->
<div class="flex items-end justify-between py-6 mb-2">
<div>
<p class="text-[10px] uppercase font-bold tracking-[0.1em] text-on-surface-variant mb-1">INVOICE</p>
<h2 class="text-xl font-extrabold text-zinc-900">INV-2024-001</h2>
</div>
<div class="text-right">
<p class="text-[10px] uppercase font-bold tracking-[0.1em] text-on-surface-variant mb-1">TOTAL AMOUNT</p>
<p class="text-2xl font-extrabold text-primary">₹ 12,450.60</p>
</div>
</div>
<!-- Additional Charges Section -->
<section class="mb-6">
<div class="bg-surface-container-lowest p-5 rounded-xl border border-outline-variant/10 shadow-sm">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-primary" data-icon="add_circle">add_circle</span>
<h3 class="font-bold text-sm uppercase tracking-wider text-zinc-800">Additional Charges</h3>
</div>
<div class="grid grid-cols-1 gap-4">
<div class="space-y-1">
<label class="text-[11px] font-bold text-secondary uppercase tracking-tight ml-1">Charge Name</label>
<input class="w-full bg-surface-container-high border-none rounded-xl px-4 py-3 text-sm focus:ring-1 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all" type="text" value="Shipping &amp; Handling"/>
</div>
<div class="space-y-1">
<label class="text-[11px] font-bold text-secondary uppercase tracking-tight ml-1">Amount</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-sm font-bold text-zinc-400">₹</span>
<input class="w-full bg-surface-container-high border-none rounded-xl pl-8 pr-4 py-3 text-sm focus:ring-1 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all font-mono" type="number" value="150.00"/>
</div>
</div>
</div>
</div>
</section>
<!-- Discount Section -->
<section class="mb-6">
<div class="bg-surface-container-lowest p-5 rounded-xl border border-outline-variant/10 shadow-sm">
<div class="flex items-center justify-between mb-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-tertiary" data-icon="loyalty">loyalty</span>
<h3 class="font-bold text-sm uppercase tracking-wider text-zinc-800">Discount</h3>
</div>
<!-- Toggle -->
<div class="flex p-1 bg-surface-container rounded-lg">
<button class="px-3 py-1 text-[10px] font-extrabold rounded-md bg-white shadow-sm text-primary">FLAT ₹</button>
<button class="px-3 py-1 text-[10px] font-extrabold text-secondary hover:text-primary transition-colors">% PERCENT</button>
</div>
</div>
<div class="space-y-1">
<label class="text-[11px] font-bold text-secondary uppercase tracking-tight ml-1">Discount Amount</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-sm font-bold text-zinc-400">₹</span>
<input class="w-full bg-surface-container-high border-none rounded-xl pl-8 pr-4 py-3 text-sm focus:ring-1 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all font-mono" placeholder="0.00" type="number"/>
</div>
</div>
</div>
</section>
<!-- Round Off Row -->
<section class="mb-4">
<div class="flex items-center justify-between p-4 bg-surface-container-low rounded-xl">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-white flex items-center justify-center">
<span class="material-symbols-outlined text-zinc-400 text-lg" data-icon="auto_fix">auto_fix</span>
</div>
<div>
<h4 class="text-sm font-bold text-zinc-800 leading-none mb-1">Round Off</h4>
<p class="text-xs text-secondary">+ ₹ 0.40</p>
</div>
</div>
<div class="relative inline-flex items-center cursor-pointer">
<div class="w-11 h-6 bg-primary rounded-full transition-colors relative">
<div class="absolute right-1 top-1 bg-white w-4 h-4 rounded-full shadow-sm"></div>
</div>
</div>
</div>
</section>
<!-- Apply TCS Row -->
<section class="mb-6">
<div class="flex items-center justify-between p-4 bg-surface-container-low rounded-xl">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-white flex items-center justify-center">
<span class="material-symbols-outlined text-zinc-400 text-lg" data-icon="account_balance">account_balance</span>
</div>
<h4 class="text-sm font-bold text-zinc-800">Apply TCS</h4>
</div>
<select class="bg-transparent border-none text-sm font-bold text-primary focus:ring-0 cursor-pointer pr-8">
<option>0.1% (with PAN)</option>
<option>1.0% (No PAN)</option>
<option>None</option>
</select>
</div>
</section>
<!-- Summary Block -->
<div class="mt-8 space-y-3 p-4 bg-zinc-50 dark:bg-zinc-900 rounded-2xl">
<div class="flex justify-between items-center text-sm">
<span class="text-secondary font-medium">Subtotal</span>
<span class="text-zinc-900 font-bold">₹ 12,300.20</span>
</div>
<div class="flex justify-between items-center text-sm">
<span class="text-secondary font-medium">Adjustments</span>
<span class="text-tertiary font-bold">+ ₹ 150.40</span>
</div>
<div class="pt-3 mt-3 border-t border-dashed border-zinc-200 dark:border-zinc-800 flex justify-between items-center">
<span class="text-zinc-900 font-extrabold text-base">Final Payable</span>
<span class="text-zinc-900 font-black text-xl">₹ 12,450.60</span>
</div>
</div>
</div>
<!-- Sticky CTA (BottomNavBar Context) -->
<footer class="fixed bottom-0 left-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-white dark:bg-zinc-950 shadow-[0px_-12px_32px_rgba(25,28,29,0.06)] pointer-events-auto">
<button class="text-zinc-600 dark:text-zinc-400 flex items-center justify-center px-8 py-3 font-manrope label-md uppercase tracking-wider font-bold hover:scale-[1.02] transition-transform duration-200 active:scale-98">
<span class="material-symbols-outlined mr-2" data-icon="cancel">cancel</span>
                    Cancel
                </button>
<button class="text-white rounded-xl px-8 py-3 flex items-center justify-center gap-2 font-manrope label-md uppercase tracking-wider font-bold hover:scale-[1.02] transition-transform duration-200 shadow-lg shadow-green-500/20 active:scale-98 bg-primary">
<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
                    Save Changes
                </button>
</footer>
</main>
</div>
</body></html>
