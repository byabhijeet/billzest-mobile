<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BillZest - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-low": "#f3f4f5",
                    "surface-variant": "#e1e3e4",
                    "on-surface": "#191c1d",
                    "on-error": "#ffffff",
                    "inverse-surface": "#2e3132",
                    "on-background": "#191c1d",
                    "tertiary": "#a8353e",
                    "secondary": "#645d5c",
                    "primary-container": "#1db954",
                    "primary": "#006e2d",
                    "outline-variant": "#bccbb9",
                    "secondary-fixed": "#ebe0df",
                    "on-tertiary-fixed": "#400009",
                    "inverse-on-surface": "#f0f1f2",
                    "error-container": "#ffdad6",
                    "tertiary-fixed": "#ffdad9",
                    "on-primary-fixed-variant": "#005320",
                    "surface": "#f8f9fa",
                    "surface-container-high": "#e7e8e9",
                    "outline": "#6d7b6c",
                    "on-tertiary-fixed-variant": "#881d28",
                    "on-tertiary": "#ffffff",
                    "secondary-fixed-dim": "#cfc4c4",
                    "surface-container": "#edeeef",
                    "on-secondary": "#ffffff",
                    "tertiary-fixed-dim": "#ffb3b3",
                    "error": "#ba1a1a",
                    "tertiary-container": "#ff767b",
                    "primary-fixed-dim": "#53e076",
                    "surface-tint": "#006e2d",
                    "surface-bright": "#f8f9fa",
                    "on-surface-variant": "#3d4a3d",
                    "inverse-primary": "#53e076",
                    "primary-fixed": "#72fe8f",
                    "on-primary-container": "#004118",
                    "surface-container-highest": "#e1e3e4",
                    "background": "#f8f9fa",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-container": "#730a1b",
                    "on-secondary-container": "#696161",
                    "on-primary": "#ffffff",
                    "on-secondary-fixed": "#201a1a",
                    "on-primary-fixed": "#002108",
                    "secondary-container": "#e8dddd",
                    "surface-dim": "#d9dadb",
                    "on-secondary-fixed-variant": "#4c4545",
                    "on-error-container": "#93000a"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        }
      }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; }
        .arc-bg {
            background: radial-gradient(150% 100% at 50% 0%, #f0fdf4 35%, transparent 35.5%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .logo-text-primary { color: #191c1d; }
        .logo-text-zest { color: #1db954; }
    </style>
<style>
        body {
          min-height: 100dvh;
        }
    </style>
</head>
<body class="bg-[#f8f9fa] min-h-screen flex flex-col relative overflow-hidden">
<!-- Top Arc Background Decoration -->
<div class="absolute top-0 left-0 w-full h-full arc-bg pointer-events-none z-0"></div>
<!-- Main Content Wrapper: Centered on screen -->
<main class="flex-grow flex flex-col items-center justify-center px-6 relative z-10 py-8">
<!-- Header / Branding Area -->
<header class="flex flex-col items-center text-center mb-8">
<div class="flex items-center gap-2 mb-3">
<span class="material-symbols-outlined text-[#1db954] text-4xl" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<h1 class="text-3xl font-extrabold tracking-tighter logo-text-primary uppercase">Bill<span class="logo-text-zest">Zest</span></h1>
</div>
<p class="text-on-surface-variant font-medium text-lg max-w-xs leading-tight">
                Smart billing for Indian businesses
            </p>
</header>
<!-- Login Card: Balanced and Centered -->
<section class="w-full max-w-md bg-surface-container-lowest rounded-[1.5rem] flex flex-col gap-8 p-8 items-center text-center" style="box-shadow: 0px 12px 32px rgba(25, 28, 29, 0.06);">
<div>
<h2 class="text-[1.375rem] font-bold text-on-surface mb-2">Welcome back</h2>
<p class="text-sm text-on-surface-variant">Enter your mobile number to continue</p>
</div>
<form class="flex flex-col gap-6 items-center w-full">
<!-- Mobile Number Input Group -->
<div class="space-y-1.5 w-full">
<label class="text-[0.75rem] font-bold uppercase tracking-wider text-secondary px-1 block text-center">Mobile Number</label>
<div class="flex group justify-center">
<div class="flex items-center justify-center bg-surface-container-highest text-on-surface font-bold px-4 rounded-l-xl transition-colors group-focus-within:bg-surface-container-low">
                            +91
                        </div>
<input class="w-[200px] sm:w-auto flex-1 bg-surface-container-highest border-none focus:ring-0 focus:bg-surface-container-lowest rounded-r-xl p-4 text-on-surface placeholder:text-outline outline-none transition-all border-l border-white/10 text-center sm:text-left" placeholder="98765 43210" required="" type="tel"/>
</div>
</div>
<!-- Primary Action Button -->
<button class="w-full bg-primary-container text-on-primary font-bold py-4 rounded-xl flex items-center justify-center gap-2 text-lg hover:brightness-110 active:scale-[0.98] transition-all" type="submit">
                    Send OTP <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
</section>
</main>
<!-- Footer Component: Absolute bottom with minimal padding -->
<footer class="w-full z-10 pb-4 pt-2">
<div class="flex flex-col items-center gap-2 px-8 w-full">
<nav class="flex flex-wrap justify-center gap-x-6 gap-y-1">
<a class="text-slate-500 dark:text-slate-400 font-manrope leading-relaxed text-center hover:text-[#1DB954] underline decoration-1 underline-offset-4 transition-colors duration-200 text-xs" href="#">Terms of Service</a>
<a class="text-slate-500 dark:text-slate-400 font-manrope leading-relaxed text-center hover:text-[#1DB954] underline decoration-1 underline-offset-4 transition-colors duration-200 text-xs" href="#">Privacy Policy</a>
</nav>
<p class="text-slate-500 dark:text-slate-400 font-manrope text-[10px] leading-relaxed text-center opacity-60 uppercase tracking-widest">© 2026 BillZest. All rights reserved.</p>
</div>
</footer>
</body></html>
